<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}

function renderCheckout(){
var s=document.getElementById('checkoutScroll');
var defAddr=addresses.find(function(a){return a.isDefault})||addresses[0];
var addrHtml=defAddr?'<div class="checkout-addr"><div class="checkout-addr-name">'+defAddr.name+' '+defAddr.phone+'</div><div class="checkout-addr-detail">'+defAddr.detail+'</div></div>':'<div style="color:#999;font-size:13px;padding:12px">'+T('address.noAddr')+'</div>';
var itemsHtml=checkoutCart.map(function(item){return '<div class="checkout-item"><div class="checkout-item-img" style="background:'+item.bg+'">'+item.emoji+'</div><div class="checkout-item-name">'+item.name+'</div><div class="checkout-item-qty">x'+item.qty+'</div><div class="checkout-item-price">¥'+(item.price*item.qty)+'</div></div>'}).join('');
var subtotal=checkoutCart.reduce(function(s,i){return s+i.price*i.qty},0);
var availableCoupons=coupons.filter(function(c){return!c.used&&(!c.minOrder||subtotal>=c.minOrder)});
var couponHtml=availableCoupons.map(function(c){return '<button class="checkout-coupon-btn" data-cid="'+c.id+'">'+c.desc+'</button>'}).join('');
var pointsDiscount=usingPoints?Math.min(points,Math.floor(subtotal*0.3)):0;
s.innerHTML='<div class="checkout-section"><h4>'+T('address.title')+'</h4>'+addrHtml+'</div><div class="checkout-section"><h4>'+T('checkout.items')+'</h4>'+itemsHtml+'</div>'+(availableCoupons.length?'<div class="checkout-section"><h4>'+T('checkout.coupon')+'</h4><div class="checkout-coupon">'+couponHtml+'</div></div>':'')+'<div class="checkout-section"><h4>'+T('checkout.pointsDeduct')+'</h4><div style="display:flex;align-items:center;gap:8px;font-size:13px"><label style="cursor:pointer"><input type="checkbox" id="usePointsCheck" '+(usingPoints?'checked':'')+'> '+Math.min(points,Math.floor(subtotal*0.3))+' '+T('checkout.pointsDeduct')+' ¥'+pointsDiscount.toFixed(2)+'</label></div></div><div class="checkout-section"><div class="amount-row"><span>'+T('checkout.subtotal')+'</span><span>¥'+subtotal.toFixed(2)+'</span></div><div class="amount-row"><span>'+T('checkout.shipping')+'</span><span style="color:#07C160">'+T('checkout.free')+'</span></div>'+(checkoutCoupon?'<div class="amount-row"><span>'+T('checkout.coupon')+'</span><span style="color:#07C160">-¥'+getCouponDiscount(checkoutCoupon,subtotal).toFixed(2)+'</span></div>':'')+(pointsDiscount?'<div class="amount-row"><span>'+T('checkout.pointsDeduct')+'</span><span style="color:#07C160">-¥'+pointsDiscount.toFixed(2)+'</span></div>':'')+'<div class="amount-row total"><span>'+T('checkout.actualPay')+'</span><span>¥'+getFinalPrice(subtotal).toFixed(2)+'</span></div></div><div style="padding:16px"><button class="place-order-btn" id="placeOrderBtn">'+T('checkout.placeOrder')+'</button></div>';
s.querySelectorAll('.checkout-coupon-btn').forEach(function(btn){btn.onclick=function(){s.querySelectorAll('.checkout-coupon-btn').forEach(function(b){b.classList.remove('selected')});if(checkoutCoupon===btn.dataset.cid){checkoutCoupon=null}else{btn.classList.add('selected');checkoutCoupon=btn.dataset.cid}renderCheckout()}});
var pCheck=document.getElementById('usePointsCheck');if(pCheck)pCheck.onchange=function(){usingPoints=pCheck.checked;renderCheckout()};
var placeBtn=document.getElementById('placeOrderBtn');if(placeBtn)placeBtn.onclick=function(){placeOrder(subtotal)};
}

function getCouponDiscount(cid,subtotal){
var c=coupons.find(function(x){return x.id===cid});if(!c)return 0;
var t=c.typeCode||c.type;
if(t==='cash')return c.amount;
if(t==='discount')return subtotal*(1-c.discount);
if(t==='freeship')return 0;
return 0;
}

function getFinalPrice(subtotal){
var disc=checkoutCoupon?getCouponDiscount(checkoutCoupon,subtotal):0;
var pts=usingPoints?Math.min(points,Math.floor(subtotal*0.3)):0;
return Math.max(0.01,subtotal-disc-pts);
}

function placeOrder(subtotal){
if(addresses.length===0){showToast(T('toast.noAddr'));return}
var loader=document.createElement('div');loader.className='checkout-loading';loader.innerHTML='<div class="spinner"></div><div style="font-size:13px;color:#666">'+T('toast.submitting')+'</div>';
document.getElementById('checkoutPage').appendChild(loader);
setTimeout(function(){
loader.remove();
var disc=checkoutCoupon?getCouponDiscount(checkoutCoupon,subtotal):0;
var pts=usingPoints?Math.min(points,Math.floor(subtotal*0.3)):0;
var finalPrice=Math.max(0.01,subtotal-disc-pts);
var order={id:genId(),items:checkoutCart.map(function(i){return{id:i.id,name:i.name,price:i.price,qty:i.qty,emoji:i.emoji,bg:i.bg}}),subtotal:subtotal,discount:disc,pointsDiscount:pts,shipping:0,total:finalPrice,status:'pending',address:addresses.find(function(a){return a.isDefault})||addresses[0],createdAt:Date.now(),logistics:[],refundStatus:null,reviewed:false};
if(checkoutCoupon){var cp=coupons.find(function(c){return c.id===checkoutCoupon});if(cp){cp.used=true;save('mp_coupons',coupons)}}
if(pts>0){points-=pts;pointsHistory.push({type:'minus',amount:pts,descKey:'points.orderDeduct',date:Date.now()});save('mp_points',points);save('mp_points_history',pointsHistory)}
var earnedPts=Math.floor(finalPrice);
points+=earnedPts;pointsHistory.push({type:'plus',amount:earnedPts,descKey:'points.purchaseReward',date:Date.now()});save('mp_points',points);save('mp_points_history',pointsHistory);
simulateLogistics(order);
orders.push(order);save('mp_orders',orders);
cart=cart.filter(function(c){return checkoutCart.indexOf(c)===-1});if(cart.length===0&&checkoutCart.length>0)cart=[];
save('mp_cart',cart);
checkoutCoupon=null;usingPoints=false;
document.getElementById('checkoutPage').classList.remove('show');
showToast(T('toast.orderSuccess')+earnedPts+T('toast.pointsReward'));
renderCart();renderProfile();
},1500);
}

function simulateLogistics(order){
var stages=[
{text:T('order.ordered'),time:order.createdAt},
{text:T('order.warehouse'),time:order.createdAt+3600000},
{text:T('order.pickedUp'),time:order.createdAt+7200000},
{text:T('order.inTransit'),time:order.createdAt+14400000},
{text:T('order.delivering'),time:order.createdAt+28800000},
{text:T('order.delivered'),time:order.createdAt+43200000}
];
var elapsed=Date.now()-order.createdAt;
var stageIdx=0;
if(elapsed>60000)stageIdx=1;if(elapsed>120000)stageIdx=2;if(elapsed>300000)stageIdx=3;if(elapsed>600000)stageIdx=4;if(elapsed>900000){stageIdx=5;order.status='completed'}
order.logistics=stages.slice(0,stageIdx+1);
}

function openPointsPage(){

function openCategoryPage(cat){
document.getElementById('categoryPageTitle').textContent=catName(cat)||cat;
var s=document.getElementById('catPageFilters');
s.innerHTML='<button class="cat-filter-btn active" data-sort="default">'+T('cat.all')+'</button><button class="cat-filter-btn" data-sort="sales">'+T('cat.sales')+'</button><button class="cat-filter-btn" data-sort="priceAsc">'+T('cat.priceUp')+'</button><button class="cat-filter-btn" data-sort="priceDesc">'+T('cat.priceDown')+'</button><button class="cat-filter-btn" data-sort="new">'+T('cat.new')+'</button>';
var cs=document.getElementById('categoryScroll');
function renderCat(sort){
var filtered=products.filter(function(p){return p.cat===cat});
if(sort==='sales')filtered.sort(function(a,b){return parseFloat(b.sold)-parseFloat(a.sold)});
else if(sort==='priceAsc')filtered.sort(function(a,b){return a.price-b.price});
else if(sort==='priceDesc')filtered.sort(function(a,b){return b.price-a.price});
else if(sort==='new')filtered.sort(function(a,b){return b.id-a.id});
cs.innerHTML='<div class="rec-grid" style="padding:12px 16px">'+filtered.map(function(p){
var tag=p.tag?'<span class="rec-tag">'+p.tag+'</span>':'';
return '<div class="rec-card" data-id="'+p.id+'"><div class="rec-img" style="background:'+p.bg+'">'+p.emoji+'</div><div class="rec-info"><div class="rec-name">'+tag+p.name+'</div><div class="rec-price-row"><div class="rec-price"><span class="yen">¥</span>'+p.price+'</div><div class="rec-orig">¥'+p.orig+'</div></div><div class="rec-sold">'+T('home.sold')+p.sold+'</div><div class="rec-points">'+T('home.pointsEarn')+p.points+T('home.pts')+'</div></div></div>';
}).join('')+'</div>';
cs.querySelectorAll('.rec-card').forEach(function(el){el.onclick=function(){openDetail(parseInt(el.dataset.id))}});
}
renderCat('default');
s.querySelectorAll('.cat-filter-btn').forEach(function(btn){btn.onclick=function(){s.querySelectorAll('.cat-filter-btn').forEach(function(b){b.classList.remove('active')});btn.classList.add('active');renderCat(btn.dataset.sort)}});
document.getElementById('categoryPage').classList.add('show');
}
document.getElementById('categoryBack').onclick=function(){document.getElementById('categoryPage').classList.remove('show')};

var chatReplies={'default':''};
var chatQuickItems=[];
function rebuildChatI18n(){
chatReplies={'default':T('chat.replyDefault')};
chatQuickItems=[T('chat.shipTime'),T('chat.returnEx'),T('chat.shippingFee'),T('chat.couponUse')];
chatQuickItems.forEach(function(q){chatReplies[q]=T('chat.replyShip')});
chatReplies[T('chat.shipTime')]=T('chat.replyShip');
chatReplies[T('chat.returnEx')]=T('chat.replyReturn');
chatReplies[T('chat.shippingFee')]=T('chat.replyFee');
chatReplies[T('chat.couponUse')]=T('chat.replyCoupon');
var qEl=document.getElementById('chatQuick');if(qEl){qEl.innerHTML='';chatQuickItems.forEach(function(q){var btn=document.createElement('button');btn.className='chat-quick-btn';btn.textContent=q;btn.onclick=function(){sendChatMessage(q)};qEl.appendChild(btn)})}
}
rebuildChatI18n();

function toggleChat(forceOpen){
var panel=document.getElementById('chatPanel');
var fab=document.getElementById('chatFab');
var badge=document.getElementById('chatBadge');
if(forceOpen||!panel.classList.contains('open')){panel.classList.add('open');badge.style.display='none';
if(chatHistory.length===0){addChatMsg('bot',T('chat.prompt'));chatQuickItems.forEach(function(q){addChatMsg('bot',null,true)});
chatHistory.push({type:'bot',text:T('chat.prompt'),time:Date.now()});}
}else{panel.classList.remove('open')}
}

function addChatMsg(type,text,isQuick){
var c=document.getElementById('chatMessages');
if(isQuick){var q=document.getElementById('chatQuick');if(q){var btn=document.createElement('button');btn.className='chat-quick-btn';btn.textContent=text;btn.onclick=function(){sendChatMessage(text)};q.appendChild(btn)}return}
var div=document.createElement('div');div.className='chat-msg '+type;div.textContent=text;div.style.whiteSpace='pre-wrap';c.appendChild(div);c.scrollTop=c.scrollHeight;
}

function sendChatMessage(text){
if(!text.trim())return;
var c=document.getElementById('chatMessages');
var uDiv=document.createElement('div');uDiv.className='chat-msg user';uDiv.textContent=text;c.appendChild(uDiv);
chatHistory.push({type:'user',text:text,time:Date.now()});
var reply=chatReplies[text]||chatReplies['default'];
setTimeout(function(){
var bDiv=document.createElement('div');bDiv.className='chat-msg bot';bDiv.textContent=reply;bDiv.style.whiteSpace='pre-wrap';c.appendChild(bDiv);c.scrollTop=c.scrollHeight;
chatHistory.push({type:'bot',text:reply,time:Date.now()});save('mp_chat_history',chatHistory);
},500);
c.scrollTop=c.scrollHeight;save('mp_chat_history',chatHistory);
}

document.getElementById('chatFab').onclick=function(){toggleChat()};
document.getElementById('chatClose').onclick=function(){document.getElementById('chatPanel').classList.remove('open')};
document.getElementById('chatSendBtn').onclick=function(){var inp=document.getElementById('chatInput');sendChatMessage(inp.value);inp.value=''};
document.getElementById('chatInput').onkeydown=function(e){if(e.key==='Enter'){e.preventDefault();document.getElementById('chatSendBtn').click()}};

var searchTimer=null;
document.getElementById('searchInput').onfocus=function(){
document.getElementById('searchHistoryPanel').style.display='block';document.getElementById('homeContent').style.display='none';
renderSearchHistory();renderHotWords();
};
document.getElementById('searchInput').onblur=function(){setTimeout(function(){document.getElementById('searchHistoryPanel').style.display='none';document.getElementById('homeContent').style.display='block'},200)};
document.getElementById('searchInput').oninput=function(){var v=this.value.trim();clearTimeout(searchTimer);if(v){searchTimer=setTimeout(function(){renderRec(v)},300)}else{renderRec()}};
document.getElementById('searchInput').onkeydown=function(e){if(e.key==='Enter'){var v=this.value.trim();if(v){if(searchHistory.indexOf(v)===-1){searchHistory.unshift(v);if(searchHistory.length>10)searchHistory.pop();save('mp_search_history',searchHistory)}renderRec(v);this.blur()}}};

var bannerIdx=0;var bannerCount=4;var bannerTimer;
function slideBanner(idx){
bannerIdx=idx!==undefined?idx:(bannerIdx+1)%bannerCount;
document.getElementById('bannerTrack').style.transform='translateX(-'+bannerIdx*100+'%)';
document.querySelectorAll('#dots .dot').forEach(function(d,i){d.classList.toggle('active',i===bannerIdx)});
}
function startBanner(){bannerTimer=setInterval(function(){slideBanner()},3500)}
startBanner();

var cdTotal=2*3600+34*60+56;
function updateCountdown(){
if(cdTotal<=0)cdTotal=7200;
var h=Math.floor(cdTotal/3600);var m=Math.floor((cdTotal%3600)/60);var s=cdTotal%60;
document.getElementById('cdH').textContent=String(h).padStart(2,'0');
document.getElementById('cdM').textContent=String(m).padStart(2,'0');
document.getElementById('cdS').textContent=String(s).padStart(2,'0');
cdTotal--;
}
setInterval(updateCountdown,1000);

function switchTab(tab){
document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
if(tab==='home'){document.getElementById('pageHome').classList.add('active');document.querySelector('.chat-widget').style.display='block'}
else if(tab==='cart'){document.getElementById('pageCart').classList.add('active');renderCart();document.querySelector('.chat-widget').style.display='none'}
else if(tab==='profile'){document.getElementById('pageProfile').classList.add('active');renderProfile();document.querySelector('.chat-widget').style.display='none'}
document.querySelectorAll('.tab-item').forEach(function(t){t.classList.toggle('active',t.dataset.tab===tab)});
}
document.querySelectorAll('.tab-item').forEach(function(t){t.onclick=function(){switchTab(t.dataset.tab)}});

document.getElementById('categoryRow').addEventListener('click',function(e){var item=e.target.closest('.cat-item');if(item){openCategoryPage(item.dataset.cat)}});

setTimeout(function(){document.getElementById('couponPopup').classList.add('show')},2000);
document.getElementById('couponClose').onclick=function(){document.getElementById('couponPopup').classList.remove('show')};
document.getElementById('couponUse').onclick=function(){
couponClaimed=true;save('mp_coupon_claimed',true);
coupons.push({id:'new30',typeCode:'cash',type:'满减',amount:30,minOrder:99,discount:0,desc:'满99减30（新人券）',expire:Date.now()+7*86400000,used:false});
save('mp_coupons',coupons);document.getElementById('couponPopup').classList.remove('show');showToast(T('toast.couponClaimed'));
};
}

renderCategoryRow();renderLive();renderFlash();renderRec();
renderCart();renderProfile();
applyStaticI18n();

})();
